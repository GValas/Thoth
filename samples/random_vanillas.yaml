root: random_vanillas

# 1000 random European vanillas on one equity (spot 100, flat 30% vol, flat 5%
# rate), priced in a single MCL sweep. Strikes ~U[50,150], type call/put 50/50,
# maturities ~U[0.5y, 4y]. Reproducible: generated with seed 42.
# GPU-priceable: European single-asset vanillas are GPU GBM-eligible and the
# mcl_configuration sets allow_gpu, so on a CUDA build the whole book runs on the
# device (CPU fallback otherwise). e.g. ./scripts/build_run.sh samples/random_vanillas.yaml --gpu

random_vanillas: !mcl_pricer
  today: 2000-01-01
  book: book
  currency: eur
  mcl_configuration: mcl_config
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: random_vanillas_result

mcl_config: !mcl_configuration
  max_day_step: 7
  min_day_step: -1
  paths: 50000
  vol_year_step: 0.01
  use_sobol: true
  allow_gpu: true #!< European single-asset vanillas -> GPU GBM kernel on a CUDA build

