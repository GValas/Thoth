root: sabr

# Realistic SABR equity volatility surface, priced two ways on the same book:
#   ANA : Black-Scholes at the SABR implied vol of each option's strike
#   MCL : Monte-Carlo on the *Dupire local vol* derived from that SABR surface
# By the Dupire repricing property the two agree (within Monte-Carlo error): the
# local-vol diffusion reproduces the implied-vol prices it was built from. The PDE
# engine is intentionally not run here — it still uses a single ATM vol, so it would
# not reprice the smile.
#
# The book holds an at-the-money call and a 10%-out-of-the-money put: the put sits
# on the downside skew (rho < 0), so it is where the smile matters most.

sabr: !sequence
  result: sabr_result
  tasks: [sabr_ana, sabr_mcl]

sabr_ana: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: cfg_ana
  correlation: correl
  indicators: [premium, delta, gamma, vega]
  result: sabr_ana_result

sabr_mcl: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega]
  result: sabr_mcl_result

# --- configurations --------------------------------------------------------
cfg_ana: !pricer_configuration
  method: ana
  log_path: "/tmp/"
cfg_mcl: !pricer_configuration
  method: mcl
  mcl_configuration: mcl_cfg
  log_path: "/tmp/"
mcl_cfg: !mcl_configuration
  max_time_step: 3          # ~weekly diffusion grid (calendar days)
  min_time_step: -1
  paths: 300000
  vol_time_step: 0.01
  use_sobol: true

# --- book / contracts ------------------------------------------------------
book: !book
  options: [atm_call, otm_put]
atm_call: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2001-12-31
  nominal: 1
  type: call
  exercise: european
otm_put: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 90
  is_absolute_strike: true
  maturity: 2001-12-31
  nominal: 1
  type: put
  exercise: european

# --- market data -----------------------------------------------------------
eq: !equity
  spot: 100
  volatility: sabr_vol
  currency: eur

# Realistic single-name equity SABR surface (per-maturity, lognormal beta = 1):
#   alpha : ATM vol level, gently declining with maturity (~22% -> 19%)
#   rho   : negative spot/vol correlation (downside skew), flattening with maturity
#   nu    : vol-of-vol, high at the short end and decaying with maturity
# Parameters are linearly interpolated in time and held flat beyond the ends.
sabr_vol: !sabr_volatility
  maturities: [0.25, 0.50, 1.00, 2.00]
  alpha:      [0.22, 0.21, 0.20, 0.19]
  beta:       [1.00, 1.00, 1.00, 1.00]
  rho:        [-0.60, -0.55, -0.50, -0.45]
  nu:         [0.70, 0.55, 0.40, 0.30]
  calendar: calendar
calendar: !simple_weighted_calendar
  non_working_days_weight: 1

eur: !currency
  rate: eur_rate
eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [3, 3]

correl: !correlation_matrix
  underlyings: [eq]
  matrix: [1]
