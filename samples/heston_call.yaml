root: heston

# 1y ATM call on a Heston stochastic-vol underlying (spot 100, strike 100,
# rate 5%). The same book is priced by all three engines — they agree:
#   ANA : characteristic function (Carr-Madan / Little-Heston-Trap)
#   PDE : 2-D (S, v) Douglas-ADI grid
#   MCL : Andersen QE variance + log-spot scheme
# Heston params: v0 = long var = 25% vol, kappa 2, vol-of-vol 0.5, rho -0.7
# (the negative spot/vol correlation gives the usual equity skew).

heston: !sequence
  result: heston_result
  tasks: [heston_ana, heston_pde, heston_mcl, bates_ana, bates_mcl]

heston_ana: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: cfg_ana
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: heston_ana_result

heston_pde: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: cfg_pde
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: heston_pde_result

heston_mcl: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: heston_mcl_result

# Bates = Heston + lognormal jumps (crash-like: negative jump mean). Priced by
# ANA (closed-form jump factor on the characteristic function) and MCL (a
# compound-Poisson jump on the QE spot); they agree, and the jumps lift the
# premium above pure Heston. PDE is not supported for Bates (it needs a PIDE).
bates_ana: !pricer
  today: 2000-01-01
  book: book_bates
  currency: eur
  configuration: cfg_ana
  correlation: correl_bates
  indicators: [premium]
  result: bates_ana_result
bates_mcl: !pricer
  today: 2000-01-01
  book: book_bates
  currency: eur
  configuration: cfg_mcl
  correlation: correl_bates
  indicators: [premium]
  result: bates_mcl_result

# --- configurations --------------------------------------------------------
cfg_ana: !pricer_configuration
  method: ana
  log_path: "/tmp/"
cfg_pde: !pricer_configuration
  method: pde
  pde_configuration: pde_cfg
  log_path: "/tmp/"
cfg_mcl: !pricer_configuration
  method: mcl
  mcl_configuration: mcl_cfg
  log_path: "/tmp/"
pde_cfg: !pde_configuration
  vanilla_precision: high
mcl_cfg: !mcl_configuration
  max_time_step: 3
  min_time_step: -1
  paths: 200000
  vol_time_step: 0.01
  use_sobol: true
  use_milstein: true

# --- book / contract -------------------------------------------------------
book: !book
  options: [heston_call]
heston_call: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european
book_bates: !book
  options: [bates_call]
bates_call: !vanilla
  underlying: eq_bates
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european

# --- market data -----------------------------------------------------------
eq: !equity
  spot: 100
  volatility: heston_vol
  currency: eur
heston_vol: !heston_volatility
  spot: 100
  init_vol: 25      # sqrt(v0)  in percent
  long_vol: 25      # sqrt(theta) in percent
  kappa: 2          # mean-reversion speed
  vol_of_vol: 0.5   # xi
  # rho (spot/variance correlation) is read from the global correlation matrix:
  # the variance factor is the pseudo-underlying "eq_var" (see correl below).
  calendar: calendar
calendar: !simple_weighted_calendar
  non_working_days_weight: 1
eur: !currency
  rate: eur_rate
eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [5, 5]
# the Heston spot/variance correlation rho = -0.7 lives here: "eq" against its
# variance pseudo-underlying "eq_var".
correl: !correlation_matrix
  underlyings: [eq, eq_var]
  matrix: [1, -0.7, -0.7, 1]

# Bates underlying: same Heston dynamics plus lognormal jumps (0.5/yr, mean -10%,
# vol 15% in log-return space).
eq_bates: !equity
  spot: 100
  volatility: heston_vol_bates
  currency: eur
heston_vol_bates: !heston_volatility
  spot: 100
  init_vol: 25
  long_vol: 25
  kappa: 2
  vol_of_vol: 0.5
  jump_intensity: 0.5
  jump_mean: -0.10
  jump_vol: 0.15
  calendar: calendar
correl_bates: !correlation_matrix
  underlyings: [eq_bates, eq_bates_var]
  matrix: [1, -0.7, -0.7, 1]
