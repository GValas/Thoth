root: simple_call_pricing

# 1y ATM call: spot 100, strike 100, flat vol 30%, flat rate 8%, no repo,
# no dividends. Black-Scholes reference premium ~= 15.71.

simple_call_pricing: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: config
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: simple_call_result
  debug_configuration: debug

config: !pricer_configuration
  method: mcl
  mcl_configuration: mcl_config
  pde_configuration: pde_config
  log_path: "/tmp/"

# node-graph dump: a debug switch on its own object, referenced by the pricer
# above (debug_configuration: debug) — NOT a field of mcl_configuration.
debug: !debug_configuration
  generate_nodes_graph: true

mcl_config: !mcl_configuration
  max_day_step: 1
  min_day_step: -1
  paths: 10000000
  vol_year_step: 0.01
  use_sobol: true
  generate_nodes_graph: true

pde_config: !pde_configuration
  vanilla_precision: high

book: !book
  options: [simple_call]

simple_call: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european

# equity with no repo and no dividends (both optional -> treated as 0)
eq: !equity
  spot: 100
  volatility: vol
  currency: eur

vol: !bs_volatility
  volatility: 30
  calendar: volatility_calendar

volatility_calendar: !simple_weighted_calendar
  non_working_days_weight: 1

eur: !currency
  rate: eur_rate

eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [8, 8]

correl: !correlation_matrix
  underlyings: [eq]
  matrix: [1]
