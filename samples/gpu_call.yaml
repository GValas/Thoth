root: gpu_call_pricing

# 1y ATM call (spot 100, strike 100, rate 8%, vol 30%) priced by the MCL engine
# with GPU acceleration requested (method: mcl, allow_gpu: true). On a CUDA build
# with an NVIDIA GPU the single-asset European vanilla is simulated on the device
# (forward-measure GBM, one thread per path); Greeks are per-contract bump-and-
# revalue with a fixed kernel seed (common random numbers). On a CPU-only build,
# or a host without a GPU, it transparently runs on the CPU MCL engine -> identical
# results. Black-Scholes reference premium ~15.71.
#
# (The old `method: mcl_gpu` still works as a deprecated alias for this pair.)
#
#   ./run_docker_server.sh --gpu                    # GPU server (needs an NVIDIA GPU)
#   ./run_local_client.sh samples/gpu_call.yaml

gpu_call_pricing: !pricer
  today: 2000-01-01
  book: book
  currency: eur
  configuration: config
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: gpu_call_result

config: !pricer_configuration
  method: mcl
  mcl_configuration: mcl_config
  log_path: "samples/"

mcl_config: !mcl_configuration
  max_time_step: 3
  min_time_step: -1
  paths: 1000000
  vol_time_step: 0.01
  use_sobol: true
  allow_gpu: true

book: !book
  options: [gpu_call]

gpu_call: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european

eq: !equity
  spot: 100
  volatility: vol
  currency: eur

vol: !bs_volatility
  volatility: 30
  calendar: calendar

calendar: !simple_weighted_calendar
  non_working_days_weight: 1

eur: !currency
  rate: eur_rate

eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [8, 8]

correl: !correlation_matrix
  underlyings: [eq]
  matrix: [1]
