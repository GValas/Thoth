# --- shared pricing configurations -----------------------------------------
cfg_pde: !pricer_configuration
  method: pde
  pde_configuration: shared_pde
  log_path: "/tmp/"
cfg_mcl: !pricer_configuration
  method: mcl
  mcl_configuration: shared_mcl
  log_path: "/tmp/"
cfg_ana: !pricer_configuration
  method: ana
  log_path: "/tmp/"

shared_pde: !pde_configuration
  vanilla_precision: high
shared_mcl: !mcl_configuration
  max_time_step: 1
  min_time_step: -1
  paths: 50000
  vol_time_step: 0.01
  use_sobol: true
  use_milstein: true

# --- books (one contract each) ---------------------------------------------
book_van_eu: !book
  options: [c_van_eu]
book_van_am: !book
  options: [c_van_am]
book_barr_cont: !book
  options: [c_barr_cont]
book_barr_disc: !book
  options: [c_barr_disc]
book_vswap: !book
  options: [c_vswap]
book_van_eu_q: !book
