# --- shared market data ----------------------------------------------------
eq: !equity
  spot: 100
  volatility: vol
  currency: eur
# composite view of eq: the EUR asset settled in USD (uses eur/usd + correl_q)
comp: !composite
  equity: eq
  composite_currency: usd
# second equity + rainbow (best-of / worst-of) underlyings on (eq, eq2)
eq2: !equity
  spot: 100
  volatility: vol
  currency: eur
rb_best: !rainbow
  underlyings: [eq, eq2]
  type: best_of
rb_worst: !rainbow
  underlyings: [eq, eq2]
  type: worst_of
# weighted-average basket on (eq, eq2)
bskt: !basket
  underlyings: [eq, eq2]
  weights: [0.5, 0.5]
# SABR local-vol equities (single-maturity smiled surface: ATM 30%, downside skew
# rho<0, vol-of-vol nu) and the composite / basket views built on them
eq_sabr: !equity
  spot: 100
  volatility: sabr_vol
  currency: eur
eq2_sabr: !equity
  spot: 100
  volatility: sabr_vol
  currency: eur
sabr_vol: !sabr_volatility
  maturities: [1.0]
  alpha: [0.30]
  beta: [1.0]
  rho: [-0.3]
  nu: [0.4]
  calendar: calendar
comp_sabr: !composite
  equity: eq_sabr
  composite_currency: usd
bskt_sabr: !basket
  underlyings: [eq_sabr, eq2_sabr]
  weights: [0.5, 0.5]
# heston / bates stochastic-vol underlyings (rho carried by the *_var pseudo-udl)
eq_h: !equity
  spot: 100
  volatility: heston_vol
  currency: eur
heston_vol: !heston_volatility
  spot: 100
  init_vol: 25
  long_vol: 25
  kappa: 2
  vol_of_vol: 0.5
  calendar: calendar
eq_b: !equity
  spot: 100
  volatility: bates_vol
  currency: eur
bates_vol: !heston_volatility
  spot: 100
  init_vol: 25
  long_vol: 25
  kappa: 2
  vol_of_vol: 0.5
  jump_intensity: 0.5
  jump_mean: -0.10
  jump_vol: 0.15
  calendar: calendar
vol: !bs_volatility
  volatility: 30
  calendar: calendar
calendar: !simple_weighted_calendar
  non_working_days_weight: 1
eur: !currency
  rate: eur_rate
eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [8, 8]
correl: !correlation_matrix
  underlyings: [eq]
  matrix: [1]
# two-asset correlation for the rainbow (eq, eq2) at 0.5
correl_rb: !correlation_matrix
  underlyings: [eq, eq2]
  matrix: [1, 0.5, 0.5, 1]
# heston / bates spot-variance correlation rho = -0.7 (eq_*, eq_*_var)
correl_h: !correlation_matrix
  underlyings: [eq_h, eq_h_var]
  matrix: [1, -0.7, -0.7, 1]
correl_b: !correlation_matrix
  underlyings: [eq_b, eq_b_var]
  matrix: [1, -0.7, -0.7, 1]

# USD leg + FX for the quanto cases (r_usd = 5%, eur/usd vol 15%, corr 0.5)
usd: !currency
  rate: usd_rate
usd_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [5, 5]
eur/usd: !forex
  base_currency: usd
  underlying_currency: eur
  spot: 1.5
  volatility: eur/usd_vol
eur/usd_vol: !bs_volatility
  volatility: 15
correl_q: !correlation_matrix
  underlyings: [eq]
  forexs: [eur/usd]
  matrix: [1, 0.5, 0.5, 1]
# SABR local-vol correlations (mono, basket on eq_sabr/eq2_sabr at 0.5, composite)
correl_sabr: !correlation_matrix
  underlyings: [eq_sabr]
  matrix: [1]
correl_basket_sabr: !correlation_matrix
  underlyings: [eq_sabr, eq2_sabr]
  matrix: [1, 0.5, 0.5, 1]
correl_compo_sabr: !correlation_matrix
  underlyings: [eq_sabr]
  forexs: [eur/usd]
  matrix: [1, 0.5, 0.5, 1]
