# discrete (monthly) up-and-out barrier call
p_barr_disc_pde: !pricer
  today: 2000-01-01
  book: book_barr_disc
  currency: eur
  configuration: cfg_pde
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_barr_disc_pde_result
p_barr_disc_mcl: !pricer
  today: 2000-01-01
  book: book_barr_disc
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_barr_disc_mcl_result

# composite vanilla (EUR asset, payoff settled in USD at the prevailing FX). The
# USD value S*FX is lognormal, so all three engines agree: ANA uses the composite
# forward/vol closed form, MCL builds spot*FX in the node graph, PDE diffuses the
# composite as a plain USD asset.
p_compo_pde: !pricer
  today: 2000-01-01
  book: book_compo
  currency: usd
  configuration: cfg_pde
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_compo_pde_result
p_compo_mcl: !pricer
  today: 2000-01-01
  book: book_compo
  currency: usd
  configuration: cfg_mcl
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_compo_mcl_result
p_compo_ana: !pricer
  today: 2000-01-01
  book: book_compo
  currency: usd
  configuration: cfg_ana
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_compo_ana_result

# variance swap
p_vswap_mcl: !pricer
  today: 2000-01-01
  book: book_vswap
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_vswap_mcl_result
p_vswap_ana: !pricer
  today: 2000-01-01
  book: book_vswap
  currency: eur
  configuration: cfg_ana
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_vswap_ana_result

# --- shared pricing configurations -----------------------------------------
cfg_pde: !pricer_configuration
  method: pde
  pde_configuration: shared_pde
  log_path: "/tmp/"
cfg_mcl: !pricer_configuration
  method: mcl
  mcl_configuration: shared_mcl
  log_path: "/tmp/"
cfg_ana: !pricer_configuration
  method: ana
  log_path: "/tmp/"

shared_pde: !pde_configuration
  vanilla_precision: high
shared_mcl: !mcl_configuration
  max_time_step: 1
  min_time_step: -1
  paths: 50000
  vol_time_step: 0.01
  use_sobol: true
  use_milstein: true

# --- books (one contract each) ---------------------------------------------
book_van_eu: !book
  options: [c_van_eu]
book_van_am: !book
  options: [c_van_am]
book_barr_cont: !book
  options: [c_barr_cont]
book_barr_disc: !book
  options: [c_barr_disc]
book_vswap: !book
  options: [c_vswap]
book_van_eu_q: !book
  options: [c_van_eu_q]
book_van_am_q: !book
  options: [c_van_am_q]
book_compo: !book
  options: [c_compo]

# --- contracts -------------------------------------------------------------
c_van_eu: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  maturity: 2000-12-31
  type: call
  exercise: european

c_van_am: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  maturity: 2000-12-31
  type: put
  exercise: american

c_barr_cont: !barrier
  underlying: eq
  premium_currency: eur
  strike: 100
  maturity: 2000-12-31
  type: call
  barrier_type: up&out
  barrier_monitoring_type: continuous_monitoring
  barrier_up_level: 130

c_barr_disc: !barrier
  underlying: eq
  premium_currency: eur
  strike: 100
  maturity: 2000-12-31
  type: call
  barrier_type: up&out
  barrier_monitoring_type: discrete_monitoring
  monitoring_period_days: 30
  barrier_up_level: 130

c_vswap: !variance_swap
  underlying: eq
  premium_currency: eur
  maturity: 2000-12-31
  volatility_strike: 20
  notional: 10000

# quanto twins of the european call / american put: same EUR asset, premium in USD
c_van_eu_q: !vanilla
  underlying: eq
  premium_currency: usd
  strike: 100
  maturity: 2000-12-31
  type: call
  exercise: european
c_van_am_q: !vanilla
  underlying: eq
  premium_currency: usd
  strike: 100
  maturity: 2000-12-31
  type: put
  exercise: american

# composite call: EUR equity converted to USD at maturity FX. Composite spot =
# 100 * 1.5 = 150, so strike 150 is at-the-money.
c_compo: !vanilla
  underlying: comp
  premium_currency: usd
  strike: 150
  maturity: 2000-12-31
  type: call
  exercise: european

# --- shared market data ----------------------------------------------------
eq: !equity
  spot: 100
  volatility: vol
  currency: eur
# composite view of eq: the EUR asset settled in USD (uses eur/usd + correl_q)
comp: !composite
  equity: eq
  composite_currency: usd
vol: !bs_volatility
  volatility: 30
  calendar: calendar
calendar: !simple_weighted_calendar
  non_working_days_weight: 1
eur: !currency
  rate: eur_rate
eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [8, 8]
correl: !correlation_matrix
  underlyings: [eq]
  matrix: [1]

# USD leg + FX for the quanto cases (r_usd = 5%, eur/usd vol 15%, corr 0.5)
usd: !currency
  rate: usd_rate
usd_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [5, 5]
eur/usd: !forex
  base_currency: usd
  underlying_currency: eur
  spot: 1.5
  volatility: eur/usd_vol
eur/usd_vol: !bs_volatility
  volatility: 15
correl_q: !correlation_matrix
  underlyings: [eq]
  forexs: [eur/usd]
  matrix: [1, 0.5, 0.5, 1]
