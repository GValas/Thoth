  currency: usd
  configuration: cfg_ana
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: vanilla_mono_eu_compo_ana_result

# american composite put (early exercise on the USD value S*FX). PDE projects the
