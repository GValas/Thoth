book_van_am_q: !book
  options: [c_van_am_q]
book_compo: !book
  options: [c_compo]
book_compo_am: !book
  options: [c_compo_am]
book_rb_best: !book
  options: [c_rb_best]
book_rb_worst: !book
  options: [c_rb_worst]
book_heston: !book
  options: [c_heston]
book_bates: !book
  options: [c_bates]
book_basket: !book
  options: [c_basket]

