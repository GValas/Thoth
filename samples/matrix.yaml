root: matrix

# Full pricer/product matrix, run in one process by the !sequence task. Every
# priceable (product, method) combination below is launched one after another;
# each writes its own <name>_result block. run_pricers.sh prints the premiums
# as a table. All cases share the same 1y, spot-100, flat-30%-vol, flat-8%-rate
# market so the numbers are directly comparable across engines.
#
#   product                       method(s)
#   vanilla european (non-quanto)  pde   mcl   ana
#   vanilla european (quanto)      pde   mcl   ana
#   vanilla american put           pde   mcl
#   vanilla american put (quanto)  pde   mcl
#   barrier continuous             pde   mcl   ana
#   barrier discrete               pde   mcl
#   composite (EUR asset, USD)     pde   mcl   ana
#   variance swap                  mcl   ana
#
# Quanto european vanillas are priced by all three engines and agree: the quanto
# drift correction F *= exp(-rho(S,FX)*sigma_S*sigma_X*t) lives in the MCL node
# graph, in ANA's quanto forward (Mono::GetForward) and in the PDE carry. A
# quanto pays the EUR-asset payoff in USD; here corr(asset, eur/usd) extraction
# gives a +0.0225 carry bump, so the quanto call sits just below the EUR call
# discounted at the USD rate.

matrix: !sequence
  result: matrix_result
  tasks:
    - p_van_eu_pde
    - p_van_eu_mcl
    - p_van_eu_ana
    - p_van_eu_q_pde
    - p_van_eu_q_mcl
    - p_van_eu_q_ana
    - p_van_am_pde
    - p_van_am_mcl
    - p_van_am_q_pde
    - p_van_am_q_mcl
    - p_barr_cont_pde
    - p_barr_cont_mcl
    - p_barr_cont_ana
    - p_barr_disc_pde
    - p_barr_disc_mcl
    - p_compo_pde
    - p_compo_mcl
    - p_compo_ana
    - p_vswap_mcl
    - p_vswap_ana

# --- pricers (one per matrix cell) -----------------------------------------
# european vanilla
p_van_eu_pde: !pricer
  today: 2000-01-01
  book: book_van_eu
  currency: eur
  configuration: cfg_pde
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_eu_pde_result
p_van_eu_mcl: !pricer
  today: 2000-01-01
  book: book_van_eu
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_eu_mcl_result
p_van_eu_ana: !pricer
  today: 2000-01-01
  book: book_van_eu
  currency: eur
  configuration: cfg_ana
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_eu_ana_result

# quanto european vanilla (EUR asset, USD premium) — PDE, MCL and ANA agree
p_van_eu_q_pde: !pricer
  today: 2000-01-01
  book: book_van_eu_q
  currency: usd
  configuration: cfg_pde
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_eu_q_pde_result
p_van_eu_q_mcl: !pricer
  today: 2000-01-01
  book: book_van_eu_q
  currency: usd
  configuration: cfg_mcl
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_eu_q_mcl_result
p_van_eu_q_ana: !pricer
  today: 2000-01-01
  book: book_van_eu_q
  currency: usd
  configuration: cfg_ana
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_eu_q_ana_result

# american vanilla (put, so early exercise carries value)
p_van_am_pde: !pricer
  today: 2000-01-01
  book: book_van_am
  currency: eur
  configuration: cfg_pde
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_am_pde_result
p_van_am_mcl: !pricer
  today: 2000-01-01
  book: book_van_am
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_am_mcl_result

# quanto american put (EUR asset, USD premium) — PDE and MCL. In the PDE the
# quanto drift/discount correction is orthogonal to the American early-exercise
# projection, so an American quanto needs no extra code.
p_van_am_q_pde: !pricer
  today: 2000-01-01
  book: book_van_am_q
  currency: usd
  configuration: cfg_pde
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_am_q_pde_result
p_van_am_q_mcl: !pricer
  today: 2000-01-01
  book: book_van_am_q
  currency: usd
  configuration: cfg_mcl
  correlation: correl_q
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_van_am_q_mcl_result

# continuous up-and-out barrier call
p_barr_cont_pde: !pricer
  today: 2000-01-01
  book: book_barr_cont
  currency: eur
  configuration: cfg_pde
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_barr_cont_pde_result
p_barr_cont_mcl: !pricer
  today: 2000-01-01
  book: book_barr_cont
  currency: eur
  configuration: cfg_mcl
  correlation: correl
  indicators: [premium, delta, gamma, vega, rho, theta]
  result: p_barr_cont_mcl_result
p_barr_cont_ana: !pricer
  today: 2000-01-01
  book: book_barr_cont
