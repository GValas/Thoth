# rainbow best-of / worst-of call on two equities (eq + eq2, correl 0.5). The
# payoff is on the max / min of the rebased performances, so it is MCL-only (no
# single-lognormal forward/vol for ANA/PDE). Rainbow spot is rebased to 100, so
# strike 100 is at-the-money; best-of >= worst-of.
vanilla_multi_eu_best_of_mcl: !pricer
  today: 2000-01-01
  book: book_rb_best
  currency: eur
  configuration: cfg_mcl
  correlation: correl_rb
  indicators: [premium, delta, gamma, vega, rho, theta]
