root: matrix

# Full pricer/product matrix, run in one process by the !sequence task. Every
# priceable (product, method) combination below is launched one after another;
# each writes its own <name>_result block. run_pricers.sh prints the premiums
# as a table. All cases share the same 1y, spot-100, flat-30%-vol, flat-8%-rate
# market so the numbers are directly comparable across engines.
#
#   product (mono/multi underlying; sorted alphabetically)  method(s)
#   barrier mono continuous           ana   mcl   pde
#   barrier mono discrete             mcl   pde
#   vanilla mono am put               mcl   pde
#   vanilla mono am put qto           mcl   pde
#   vanilla mono eu                   ana   mcl   pde
#   vanilla mono eu bates (hes+jumps) ana   mcl   (ANA jump CF / MCL compound Poisson)
#   vanilla mono eu compo (EUR->USD)  ana   mcl   pde
#   vanilla mono eu heston (stoch vol)ana   mcl   pde
#   vanilla mono eu quanto            ana   mcl   pde
#   vanilla mono us compo (american)  mcl   pde
#   vanilla multi eu basket (50/50)   ana   mcl   pde
#   vanilla multi eu best-of          mcl         (max of 2 assets; MCL-only)
#   vanilla multi eu worst-of         mcl         (min of 2 assets; MCL-only)
#   variance swap mono                ana   mcl
#
# Quanto european vanillas are priced by all three engines and agree: the quanto
# drift correction F *= exp(-rho(S,FX)*sigma_S*sigma_X*t) lives in the MCL node
# graph, in ANA's quanto forward (Mono::GetForward) and in the PDE carry. A
# quanto pays the EUR-asset payoff in USD; here corr(asset, eur/usd) extraction
# gives a +0.0225 carry bump, so the quanto call sits just below the EUR call
# discounted at the USD rate.

matrix: !sequence
  result: matrix_result
  #! sorted alphabetically by product label (mono before multi), then by method
  tasks:
    - barrier_mono_continuous_ana
    - barrier_mono_continuous_mcl
    - barrier_mono_continuous_pde
    - barrier_mono_discrete_mcl
    - barrier_mono_discrete_pde
    - vanilla_mono_am_put_mcl
    - vanilla_mono_am_put_pde
    - vanilla_mono_am_put_quanto_mcl
    - vanilla_mono_am_put_quanto_pde
    - vanilla_mono_eu_ana
    - vanilla_mono_eu_mcl
    - vanilla_mono_eu_pde
    - vanilla_mono_eu_bates_ana
    - vanilla_mono_eu_bates_mcl
    - vanilla_mono_eu_compo_ana
    - vanilla_mono_eu_compo_mcl
    - vanilla_mono_eu_compo_pde
    - vanilla_mono_eu_heston_ana
    - vanilla_mono_eu_heston_mcl
    - vanilla_mono_eu_heston_pde
    - vanilla_mono_eu_quanto_ana
    - vanilla_mono_eu_quanto_mcl
    - vanilla_mono_eu_quanto_pde
    - vanilla_mono_us_compo_mcl
    - vanilla_mono_us_compo_pde
    - vanilla_multi_eu_basket_ana
    - vanilla_multi_eu_basket_mcl
    - vanilla_multi_eu_basket_pde
    - vanilla_multi_eu_best_of_mcl
    - vanilla_multi_eu_worst_of_mcl
    - variance_swap_mono_ana
    - variance_swap_mono_mcl

