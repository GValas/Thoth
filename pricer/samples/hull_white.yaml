root: hw_demo

# Hull-White 1F equity-rate hybrid demo. The EUR currency carries a stochastic
# short rate (!hull_white: mean reversion 10%, sigma_r 2%) on top of the
# multi-curve setup (projection 8%, OIS discounting 5%); the equity/rate
# correlation is the matrix entry between `eq` and the pseudo-single `eur_ir`
# (here +0.5: rates and equity rise together, which INCREASES the effective
# option variance through the positive equity/bond-vol cross term).
#
# The same 1y ATM call is priced two ways:
#   - hw_ana:  Black on the (unchanged) multi-curve forward and OIS df at the
#              effective vol sigma_eff — the exact BS+HW closed form
#   - hw_mcl:  exact OU factor diffusion, pathwise discounting exp(-int r) and
#              the equity drifting at the stochastic rate -> converges to ANA
# The PDE engine rejects the hybrid (no 2-D (S, r) grid yet).

hw_demo: !sequence
  result: hw_demo_result
  tasks: [hw_ana, hw_mcl]

hw_ana: !ana_pricer
  today: 2000-01-01
  book: book
  currency: eur
  correlation: correl
  indicators: [premium]
  result: hw_ana_result

hw_mcl: !mcl_pricer
  today: 2000-01-01
  book: book
  currency: eur
  mcl_configuration: mcl_config
  correlation: correl
  indicators: [premium, delta]
  result: hw_mcl_result

mcl_config: !mcl_configuration
  max_day_step: 7
  min_day_step: -1
  paths: 200000
  vol_year_step: 0.01
  use_sobol: true

calendar: !simple_weighted_calendar
  non_working_days_weight: 1

eur: !currency
  rate: proj_curve
  discount_rate: ois_curve
  rate_model: hw
hw: !hull_white
  mean_reversion: 0.1
  volatility: 2.0
proj_curve: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [8, 8]
ois_curve: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [5, 5]

eq: !equity
  spot: 100
  volatility: vol
  currency: eur
vol: !bs_volatility
  volatility: 30
  calendar: calendar

correl: !correlation_matrix
  underlyings: [eq, eur_ir]
  matrix: [1, 0.5, 0.5, 1]

book: !book
  contracts: [atm_call]
atm_call: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european
