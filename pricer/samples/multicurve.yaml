root: multicurve_demo

# Multi-curve / OIS discounting demo. The !currency names TWO curves: `rate` is
# the projection / funding curve (8% here — the equity forward grows at it),
# `discount_rate` the OIS / collateral curve (5% — every cash flow discounts on
# it). The same 1y ATM call is priced by the three engines; the closed form is
# Black(F = S*exp(r_proj*T), df = exp(-r_ois*T)) ~ 16.19 — visibly different
# from both single-curve prices (15.72 at 8%/8%, 14.23 at 5%/5%).
# Omitting `discount_rate` reduces exactly to the historic single-curve setup.

multicurve_demo: !sequence
  result: multicurve_demo_result
  tasks: [call_ana, call_mcl, call_pde]

call_ana: !ana_pricer
  today: 2000-01-01
  book: book
  currency: eur
  indicators: [premium, rho]
  result: call_ana_result

call_mcl: !mcl_pricer
  today: 2000-01-01
  book: book
  currency: eur
  mcl_configuration: mcl_config
  correlation: correl
  indicators: [premium, rho]
  result: call_mcl_result

call_pde: !pde_pricer
  today: 2000-01-01
  book: book
  currency: eur
  pde_configuration: pde_config
  indicators: [premium]
  result: call_pde_result

mcl_config: !mcl_configuration
  max_day_step: 30
  min_day_step: -1
  paths: 200000
  vol_year_step: 0.01
  use_sobol: true

pde_config: !pde_configuration
  vanilla_precision: high

calendar: !simple_weighted_calendar
  non_working_days_weight: 1

eur: !currency
  rate: proj_curve
  discount_rate: ois_curve
proj_curve: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [8, 8]
ois_curve: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [5, 5]

eq: !equity
  spot: 100
  volatility: vol
  currency: eur
vol: !bs_volatility
  volatility: 30
  calendar: calendar

correl: !correlation_matrix
  underlyings: [eq]
  matrix: [1]

book: !book
  contracts: [atm_call]
atm_call: !vanilla
  underlying: eq
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european
