root: matrix

# Full pricer/product matrix, run in one process by the !sequence task. Every
# priceable (product, method) combination below is launched one after another;
# each writes its own <name>_result block. scripts/run_local_client_matrix.sh prints the
# premiums + Greeks as a table. All cases share the same 1y, spot-100, flat-30%-vol,
# flat-8%-rate market so the numbers are directly comparable across engines.
#
#   product (mono/multi, call/put; sorted alphabetically)   method(s)
#   barrier mono continuous call            ana   mcl   pde
#   barrier mono continuous in call         ana   mcl   pde (knock-in; in/out parity)
#   barrier mono continuous down-out call   ana   mcl   pde (down barrier)
#   barrier mono continuous down-in call    ana   mcl   pde (down knock-in)
#   barrier mono continuous up-out put      ana   mcl   pde (put barrier)
#   barrier mono discrete in call           mcl   pde     (discrete knock-in)
#   barrier mono discrete call              mcl   pde
#   vanilla mono am call                    mcl   pde   (no dividend -> = european)
#   vanilla mono am put                     mcl   pde
#   vanilla mono am put heston (stoch vol)  mcl   pde   (American under Heston: ADI / QE+LSM)
#   vanilla mono am put quanto              mcl   pde
#   vanilla mono eu call                    ana   mcl   pde
#   vanilla mono eu call discrete-div+repo  ana   mcl   pde (escrowed cash divs + repo carry)
#   vanilla mono us put discrete-div+repo   mcl   pde     (american, escrowed cash divs + repo)
#   vanilla mono eu call (pseudo-random)    mcl         (use_sobol: false, vs the Sobol row)
#   vanilla mono eu call (gpu)              mcl         (allow_gpu: true; device on a CUDA build, else CPU)
#   vanilla mono eu put                     ana   mcl   pde
#   vanilla mono eu put (gpu)               mcl         (allow_gpu: true; device on a CUDA build, else CPU)
#   vanilla mono eu call bates (hes+jumps)  ana   mcl   pde (ANA jump CF / MCL Poisson / PDE PIDE)
#   vanilla mono eu call compo (EUR->USD)   ana   mcl   pde
#   vanilla mono eu call compo sabr         ana   mcl   (local vol; ANA implied vs MCL Dupire)
#   vanilla mono eu call heston (stoch vol) ana   mcl   pde
#   vanilla mono eu call quanto             ana   mcl   pde
#   vanilla mono eu call sabr (local vol)   ana   mcl   (ANA strike implied vs MCL Dupire; agree)
#   vanilla mono us put compo (american)    mcl   pde
#   vanilla multi eu call basket (50/50)    ana   mcl   pde
#   vanilla multi eu call basket sabr       mcl         (per-component local vol; MCL-only)
#   vanilla multi eu call best-of           mcl         (max of 2 assets; MCL-only)
#   vanilla multi eu call worst-of          mcl         (min of 2 assets; MCL-only)
#   variance swap mono                      ana   mcl   pde (ANA replication / MCL realized / PDE accumulated-variance)
#   asian mono eu call (average-price)             mcl       (arithmetic average; MCL-only, ANA/PDE reject)
#   ratchet mono (cliquet)                         mcl       (clipped period returns, global floor; MCL-only)
#   digital mono cash-or-nothing call       ana   mcl   pde (pays 1 iff S>K; struck OTM so the grid stays off the jump)
#   digital mono asset-or-nothing call      ana   mcl   pde (pays S iff S>K)
#
# 2026 features (each on its own market block — a term correlation / OIS curve /
# Hull-White rate / past fixings — appended after the shared-market cells):
#   basket term correlation (50/50)         ana   mcl   pde (rho decays 0.9->0.2; integrated view)
#   vanilla mono eu call multi-curve/OIS     ana   mcl   pde (8% projection forward, 5% OIS discount)
#   vanilla mono eu call Hull-White hybrid   ana   mcl       (BS+HW effective vol / pathwise; PDE rejects)
#   variance swap seasoned (in-life)         ana   mcl   pde (past realised leg + future, time-weighted)
#   autocallable Athena (snowball)                 mcl   pde (early redeem N*(1+k*c); ANA rejects)
#   autocallable Phoenix (conditional cpn)         mcl   pde (per-period coupon above the coupon barrier)
#   autocallable Phoenix memory                    mcl       (missed-coupon catch-up; PDE rejects)
#   vanilla mono eu call cross quanto (EUR->JPY)   ana   mcl   pde (both ccys non-pivot; FX triangulated)
#   vanilla mono eu call cross composite (EUR->JPY) ana  mcl   pde (S*FX diffused; ratio-convexity fixed)
#
# The SABR cases exercise the Dupire local-vol Monte-Carlo (the SABR implied surface
# is turned into a local-vol surface and diffused): ANA prices at the strike's
# implied vol, MCL diffuses the Dupire local vol, and they agree (Dupire repricing).
#
# Model-parameter Greeks (vega_<param>): the Heston (vega_v0/kappa/theta/xi/rho)
# cell requests these on the ANA engine, where the closed-form characteristic-function
# reprice gives them exactly. They are computed by bump-and-revalue, so the engine that
# prices the model reads the bumped parameter; the same indicators work on MCL too
# (with Monte-Carlo noise) but are shown here on ANA only — the PDE grid does not give
# reliable parameter sensitivities. (The SABR and Bates cells price premium only.)
#
# The "(gpu)" rows ask for GPU acceleration (mcl with allow_gpu: true). It is
# build-gated (-DTHOTH_ENABLE_CUDA=ON): on a CUDA build with a device the single-
# asset European vanilla runs on the GPU; on a CPU-only build the same book
# transparently runs on the CPU mcl engine (identical numbers, no acceleration),
# so the rows are always valid — see docs/gpu.md.
#
# Quanto european vanillas are priced by all three engines and agree: the quanto
# drift correction F *= exp(-rho(S,FX)*sigma_S*sigma_X*t) lives in the MCL node
# graph, in ANA's quanto forward (Mono::GetForward) and in the PDE carry. A
# quanto pays the EUR-asset payoff in USD; here corr(asset, eur/usd) extraction
# gives a +0.0225 carry bump, so the quanto call sits just below the EUR call
# discounted at the USD rate.

matrix: !sequence
  result: matrix_result
  #! sorted alphabetically by product label (mono before multi), then by method
  tasks:
    - barrier_mono_continuous_call_ana
    - barrier_mono_continuous_call_mcl
    - barrier_mono_continuous_call_pde
    - barrier_mono_discrete_call_mcl
    - barrier_mono_discrete_call_pde
    - vanilla_mono_am_put_mcl
    - vanilla_mono_am_put_pde
    - vanilla_mono_am_put_quanto_mcl
    - vanilla_mono_am_put_quanto_pde
    - vanilla_mono_eu_call_ana
    - vanilla_mono_eu_call_mcl
    - vanilla_mono_eu_call_mcl_gpu
    - vanilla_mono_eu_call_pde
    #! discrete cash dividends (escrowed model) — EU call + US (american) put
    - vanilla_mono_eu_call_div_ana
    - vanilla_mono_eu_call_div_mcl
    - vanilla_mono_eu_call_div_pde
    - vanilla_mono_am_put_div_mcl
    - vanilla_mono_am_put_div_pde
    - vanilla_mono_eu_call_bates_ana
    - vanilla_mono_eu_call_bates_mcl
    - vanilla_mono_eu_call_bates_pde
    - vanilla_mono_eu_call_compo_ana
    - vanilla_mono_eu_call_compo_mcl
    - vanilla_mono_eu_call_compo_pde
    - vanilla_mono_eu_call_heston_ana
    - vanilla_mono_eu_call_heston_mcl
    - vanilla_mono_eu_call_heston_pde
    - vanilla_mono_eu_call_quanto_ana
    - vanilla_mono_eu_call_quanto_mcl
    - vanilla_mono_eu_call_quanto_pde
    - vanilla_mono_us_put_compo_mcl
    - vanilla_mono_us_put_compo_pde
    - vanilla_multi_eu_call_basket_ana
    - vanilla_multi_eu_call_basket_mcl
    - vanilla_multi_eu_call_basket_pde
    - vanilla_multi_eu_call_best_of_mcl
    - vanilla_multi_eu_call_worst_of_mcl
    - variance_swap_mono_ana
    - variance_swap_mono_mcl
    - variance_swap_mono_pde
    #! local-vol (SABR) — ANA at the strike implied vol vs MCL on the Dupire surface
    - vanilla_mono_eu_call_sabr_ana
    - vanilla_mono_eu_call_sabr_mcl
    - vanilla_mono_eu_call_compo_sabr_ana
    - vanilla_mono_eu_call_compo_sabr_mcl
    - vanilla_multi_eu_call_basket_sabr_mcl
    #! knock-in barrier (up&in, continuous) — vanilla = knock_in + knock_out parity
    - barrier_mono_continuous_in_call_ana
    - barrier_mono_continuous_in_call_mcl
    - barrier_mono_continuous_in_call_pde
    #! coverage fill: barrier down/put/discrete-in variants
    - barrier_mono_continuous_down_out_call_ana
    - barrier_mono_continuous_down_out_call_mcl
    - barrier_mono_continuous_down_out_call_pde
    - barrier_mono_continuous_down_in_call_ana
    - barrier_mono_continuous_down_in_call_mcl
    - barrier_mono_continuous_down_in_call_pde
    - barrier_mono_continuous_up_out_put_ana
    - barrier_mono_continuous_up_out_put_mcl
    - barrier_mono_continuous_up_out_put_pde
    - barrier_mono_discrete_in_call_mcl
    - barrier_mono_discrete_in_call_pde
    #! coverage fill: vanilla put/call corners (eu put, am call) and American Heston
    - vanilla_mono_eu_put_ana
    - vanilla_mono_eu_put_mcl
    - vanilla_mono_eu_put_mcl_gpu
    - vanilla_mono_eu_put_pde
    - vanilla_mono_am_call_mcl
    - vanilla_mono_am_call_pde
    - vanilla_mono_am_put_heston_mcl
    - vanilla_mono_am_put_heston_pde
    #! coverage fill: the pseudo-random (non-Sobol) MCL path
    - vanilla_mono_eu_call_mcl_pseudo
    #! --- 2026 features (term correlation, multi-curve/OIS, Hull-White hybrid,
    #!     seasoned varswap, autocallable Athena/Phoenix) — each on its own market
    #!     block since these genuinely need a different correlation / curve / model
    - basket_term_correl_ana
    - basket_term_correl_mcl
    - basket_term_correl_pde
    - vanilla_mono_eu_call_ois_ana
    - vanilla_mono_eu_call_ois_mcl
    - vanilla_mono_eu_call_ois_pde
    - vanilla_mono_eu_call_hw_ana
    - vanilla_mono_eu_call_hw_mcl
    - variance_swap_seasoned_ana
    - variance_swap_seasoned_mcl
    - variance_swap_seasoned_pde
    - autocallable_athena_mcl
    - autocallable_athena_pde
    - autocallable_phoenix_mcl
    - autocallable_phoenix_pde
    - autocallable_phoenix_memory_mcl
    #! path-dependent, Monte-Carlo only (ANA/PDE reject)
    - asian_mono_eu_call_mcl
    - ratchet_mono_mcl
    #! European digital / binary (cash-or-nothing + asset-or-nothing)
    - digital_mono_cash_call_ana
    - digital_mono_cash_call_pde
    - digital_mono_cash_call_mcl
    - digital_mono_asset_call_ana
    - digital_mono_asset_call_pde
    - digital_mono_asset_call_mcl
    #! cross-currency (both non-pivot): triangulated FX quanto + composite
    - vanilla_mono_eu_call_cross_quanto_ana
    - vanilla_mono_eu_call_cross_quanto_pde
    - vanilla_mono_eu_call_cross_quanto_mcl
    - vanilla_mono_eu_call_cross_compo_ana
    - vanilla_mono_eu_call_cross_compo_pde
    - vanilla_mono_eu_call_cross_compo_mcl

