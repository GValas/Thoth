eq: !equity
  spot: 100
  volatility: vol
  currency: eur
# the same EUR equity carrying a 3.0 cash dividend mid-life (escrowed-dividend model)
eq_div: !equity
  spot: 100
  volatility: vol
  currency: eur
  discrete_dividends: divs
  repo: repo_div
divs: !discrete_dividends
  dates: [2000-06-30]
  amounts: [3.0]
# 1% repo spread (a continuous carry yield); the MCL drift node subtracts the repo
# node, the ANA forward and the PDE carry subtract the same yield -> engines agree
repo_div: !repo_curve
  dates: [2000-01-01, 2010-01-01]
  values: [1.0, 1.0]
# composite view of eq: the EUR asset settled in USD (uses eur/usd + the shared correl)
comp: !composite
  equity: eq
  composite_currency: usd
# second equity + rainbow (best-of / worst-of) underlyings on (eq, eq2)
eq2: !equity
  spot: 100
  volatility: vol
  currency: eur
rb_best: !rainbow
  underlyings: [eq, eq2]
  type: best_of
rb_worst: !rainbow
  underlyings: [eq, eq2]
  type: worst_of
# weighted-average basket on (eq, eq2)
bskt: !basket
  underlyings: [eq, eq2]
  weights: [0.5, 0.5]
# SABR local-vol equities (single-maturity smiled surface: ATM 30%, downside skew
# rho<0, vol-of-vol nu) and the composite / basket views built on them
eq_sabr: !equity
  spot: 100
  volatility: sabr_vol
  currency: eur
eq2_sabr: !equity
  spot: 100
  volatility: sabr_vol
  currency: eur
sabr_vol: !sabr_volatility
  maturities: [1.0]
  alpha: [0.30]
  beta: [1.0]
  rho: [-0.3]
  nu: [0.4]
  calendar: calendar
