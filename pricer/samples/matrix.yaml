# needs by name. Known pairs are filled, all other pairs are 0:
#   eq/eq2 = 0.5 (basket, rainbow)          eq/eur-usd = 0.5 (quanto)
#   eq_h/eq_h_var = -0.7, eq_b/eq_b_var = -0.7 (Heston/Bates spot-variance rho)
