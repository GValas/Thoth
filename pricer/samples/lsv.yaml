root: lsv_demo

# LSV (local-stochastic volatility) demo: a Heston variance factor whose spot
# diffusion carries a leverage L(S,t) calibrated so the model reprices the
# target SABR smile. The three pricings below share one 1y ATM call so the
# numbers are directly comparable:
#   - sabr_reference (ana):  the target surface priced directly -> the number
#                            the calibrated LSV must reproduce
#   - lsv_mcl:               QE variance + leveraged Andersen spot diffusion
#   - lsv_pde:               2-D (S,v) Douglas ADI with the leverage in the
#                            S-direction coefficients
# The Heston base (init_vol 18 vs long_vol 26, vol-of-vol 0.5, rho -0.6 from the
# correlation matrix) is deliberately OFF the target level: the leverage absorbs
# it, so all three premiums agree — while exotics would see the Heston
# forward-smile dynamics a pure local-vol model lacks.

lsv_demo: !sequence
  result: lsv_demo_result
  tasks: [sabr_reference, lsv_mcl, lsv_pde]

sabr_reference: !ana_pricer
  today: 2000-01-01
  book: sabr_book
  currency: eur
  correlation: correl
  indicators: [premium]
  result: sabr_reference_result

lsv_mcl: !mcl_pricer
  today: 2000-01-01
  book: lsv_book
  currency: eur
  mcl_configuration: mcl_config
  correlation: correl
  indicators: [premium, delta, gamma, vega]
  result: lsv_mcl_result

lsv_pde: !pde_pricer
  today: 2000-01-01
  book: lsv_book
  currency: eur
  pde_configuration: pde_config
  correlation: correl
  indicators: [premium, delta, gamma]
  result: lsv_pde_result

mcl_config: !mcl_configuration
  max_day_step: 5
  min_day_step: -1
  paths: 200000
  vol_year_step: 0.01
  use_sobol: true

pde_config: !pde_configuration
  vanilla_precision: high

sabr_book: !book
  contracts: [sabr_call]

lsv_book: !book
  contracts: [lsv_call]

sabr_call: !vanilla
  underlying: eq_sabr
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european

lsv_call: !vanilla
  underlying: eq_lsv
  premium_currency: eur
  strike: 100
  is_absolute_strike: true
  maturity: 2000-12-31
  nominal: 1
  type: call
  exercise: european

# twin equities: same spot/currency, one on the raw target surface (reference),
# one on the LSV model calibrated to it
eq_sabr: !equity
  spot: 100
  volatility: sabr_vol
  currency: eur

eq_lsv: !equity
  spot: 100
  volatility: lsv_vol
  currency: eur

# the target implied surface (a skewed SABR smile)
sabr_vol: !sabr_volatility
  maturities: [0.5, 2]
  alpha: [0.22, 0.24]
  beta: [1, 1]
  rho: [-0.5, -0.5]
  nu: [0.6, 0.5]
  calendar: volatility_calendar

# the LSV model: Heston base + calibrated leverage against sabr_vol. The
# spot/variance correlation comes from the correlation matrix (eq_lsv_var).
lsv_vol: !lsv_volatility
  spot: 100
  init_vol: 18
  long_vol: 26
  kappa: 2
  vol_of_vol: 0.5
  surface: sabr_vol
  calendar: volatility_calendar

volatility_calendar: !simple_weighted_calendar
  non_working_days_weight: 1

eur: !currency
  rate: eur_rate

eur_rate: !yield_curve
  dates: [2000-01-01, 2010-01-01]
  values: [3, 3]

correl: !correlation_matrix
  underlyings: [eq_sabr, eq_lsv, eq_lsv_var]
  matrix: [1, 0, 0,
           0, 1, -0.6,
           0, -0.6, 1]
