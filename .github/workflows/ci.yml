name: CI

# Build + test + formatting gate for the engine. Mirrors the local commands in
# CLAUDE.md / README (cmake build, ctest, ./scripts/format.sh --check) so a green CI means
# the same checks a developer runs by hand have passed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (Ubuntu, g++, Release)
    runs-on: ubuntu-24.04
    # the C++ engine lives under pricer/ since the monorepo split
    defaults:
      run:
        working-directory: pricer
    steps:
      - uses: actions/checkout@v4

      # Same Debian/Ubuntu packages the CMakeLists header lists. doctest is not
      # installed: the test CMake fetches its single header when absent.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libboost-all-dev libyaml-cpp-dev libcpp-httplib-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTHOTH_WERROR=ON

      # Cap parallelism at 2: the GitHub-hosted runner has 4 vCPUs but only
      # ~16 GB RAM, and an unbounded `-j` compiles 4 template-heavy C++23 TUs
      # at -O2 at once, which exhausts memory and gets the runner OOM-killed
      # ("received a shutdown signal", exit 143). Two concurrent jobs fit.
      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: pricer
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libboost-all-dev libyaml-cpp-dev libcpp-httplib-dev

      # Debug build instrumented with AddressSanitizer + UndefinedBehaviorSanitizer
      # to catch memory / UB bugs the Release build hides.
      - name: Configure
        run: cmake -B build-san -DCMAKE_BUILD_TYPE=Debug -DTHOTH_SANITIZE=ON

      # Same OOM cap as the Release job — the ASan/UBSan-instrumented Debug
      # build is even more memory-hungry per TU, so keep -j at 2 to stay
      # within the runner's RAM.
      - name: Build
        run: cmake --build build-san -j 2

      - name: Test (sanitized)
        env:
          ASAN_OPTIONS: halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-san --output-on-failure

  format:
    name: clang-format gate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: pricer
    steps:
      - uses: actions/checkout@v4

      # ubuntu-24.04 ships clang-format 18, matching the local toolchain that
      # produced .clang-format; pin the major so a runner image bump can't
      # silently reformat differently.
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100

      - name: Check formatting
        run: ./scripts/format.sh --check
