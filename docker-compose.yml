# Thoth dashboard — production stack (2 GPU clusters).
#
#   docker compose up --build
#   open http://localhost:7777   (nginx serves the SPA + proxies /api -> bff)
#
# Engine topology: TWO clusters, each = 1 GPU master (`thoth -cluster`) + 5 CPU slaves
# (`thoth -server`). A master prices a share of an MCL book on its own GPU and fans the
# rest of the Monte-Carlo paths out to its 5 slaves over HTTP, aggregating the result.
# The masters expose the SAME /price + /health API as a plain server, so the BFF treats
# them as two engine endpoints (THOTH_ENGINE_URLS) and its EnginePool leases ONE cluster
# per job (keeps GET /grid/:id/progress per-job-accurate). Masters are NAMED services so
# each has its own DNS name and a pinned GPU.
#
# Requires: NVIDIA Container Toolkit + at least 1 GPU. Each master pins one GPU by id:
#   THOTH_GPU_C1 (cluster 1, default 0), THOTH_GPU_C2 (cluster 2, default 0).
# Defaults put BOTH masters on GPU 0 so the stack runs on a single-GPU host (the two
# masters then share the card). With two GPUs, set THOTH_GPU_C2=1 to split them.
# THOTH_CUDA_ARCH = the GPUs' compute capability (default 89 = Ada / RTX 40-series).
# Slaves are CPU-only.

# ---- CPU slave: one ordinary HTTP pricing server (built once, shared image) -----------
x-slave: &slave
  image: thoth-cpu
  build:
    context: ./pricer
    dockerfile: Dockerfile
  restart: unless-stopped
  expose:
    - "8080"
  networks: [thoth]

# ---- GPU master: the CUDA image, run in cluster mode (command set per-master) ---------
x-master: &master
  image: thoth-gpu
  build:
    context: ./pricer
    dockerfile: Dockerfile
    args:
      ENABLE_CUDA: "ON"
      BUILD_BASE: "nvidia/cuda:12.6.3-devel-ubuntu24.04"
      RUNTIME_BASE: "nvidia/cuda:12.6.3-runtime-ubuntu24.04"
      CUDA_ARCH: "${THOTH_CUDA_ARCH:-89}"
  restart: unless-stopped
  expose:
    - "8080"
  networks: [thoth]

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks: [thoth]

  # ===== fake real-time equity spot feed: GBM walk -> Redis pub/sub (spots.tick) ========
  # the BFF subscribes once and fans the ticks out to browsers over SSE. Swap this for a
  # real market feed and nothing downstream changes.
  spot-feed:
    build:
      context: ./web/spot-feed
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [redis]
    environment:
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      TICK_MS: "1000"        # spot publish cadence (ms)
      SPOT_DRIFT: "0.05"     # annualised equity drift
      SPOT_VOL: "0.25"       # annualised equity vol
      FX_VOL: "0.08"         # annualised fx vol (pivot pairs)
      CORREL_TICK_MS: "2000" # correlation publish cadence (ms)
      CORREL_MEANREV: "12"   # OU mean-reversion speed (per year)
      CORREL_VOL: "0.6"      # OU instantaneous correlation vol
    networks: [thoth]

  # ===== cluster 1 : master on GPU 0 + 5 CPU slaves ====================================
  c1s1:  { <<: *slave }
  c1s2:  { <<: *slave }
  c1s3:  { <<: *slave }
  c1s4:  { <<: *slave }
  c1s5:  { <<: *slave }

  c1master:
    <<: *master
    command:
      - "-cluster"
      - "8080"
      - "http://c1s1:8080"
      - "http://c1s2:8080"
      - "http://c1s3:8080"
      - "http://c1s4:8080"
      - "http://c1s5:8080"
    depends_on:
      [c1s1, c1s2, c1s3, c1s4, c1s5]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${THOTH_GPU_C1:-0}"]
              capabilities: [gpu]

  # ===== cluster 2 : master on GPU 1 + 5 CPU slaves ====================================
  c2s1:  { <<: *slave }
  c2s2:  { <<: *slave }
  c2s3:  { <<: *slave }
  c2s4:  { <<: *slave }
  c2s5:  { <<: *slave }

  c2master:
    <<: *master
    command:
      - "-cluster"
      - "8080"
      - "http://c2s1:8080"
      - "http://c2s2:8080"
      - "http://c2s3:8080"
      - "http://c2s4:8080"
      - "http://c2s5:8080"
    depends_on:
      [c2s1, c2s2, c2s3, c2s4, c2s5]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${THOTH_GPU_C2:-0}"]
              capabilities: [gpu]

  bff:
    build:
      context: ./web
      dockerfile: bff/Dockerfile
    restart: unless-stopped
    depends_on: [redis, c1master, c2master]
    environment:
      PORT: "3000"
      # one URL per cluster master; the EnginePool leases one cluster per job
      THOTH_ENGINE_URLS: "http://c1master:8080,http://c2master:8080"
      QUEUE_DRIVER: "bullmq"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      DB_PATH: "/app/bff/data/thoth.sqlite"
      DB_SYNC: "true"
      # the engine's JSON Schema, mounted read-only below (single-sourced from pricer/)
      SCHEMA_PATH: "/app/schema/thoth.schema.json"
      # secrets / admin seed — override via a root .env (see .env.example)
      JWT_SECRET: "${JWT_SECRET:-change-me-access}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change-me-refresh}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@thoth.dev}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-me-please}"
    volumes:
      - bff-data:/app/bff/data
      - ./pricer/schema:/app/schema:ro
    networks: [thoth]

  web:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [bff]
    ports:
      - "7777:80"
    networks: [thoth]

  # ===== MCP server: the pricing engine as agent tools (Streamable HTTP) ================
  # Exposes the same engine the dashboard uses to MCP clients (Claude Code / Desktop,
  # agent frameworks) on http://<host>:7778/mcp — stateless HTTP transport, so any
  # number of agents can price concurrently (each request leases the cluster like any
  # other engine client; the engine serialises). Register in Claude Code with:
  #   claude mcp add --transport http thoth-pricing http://localhost:7778/mcp
  mcp:
    build:
      context: ./web
      dockerfile: mcp/Dockerfile
    restart: unless-stopped
    depends_on: [c1master]
    environment:
      MCP_TRANSPORT: "http"
      MCP_PORT: "3001"
      # the MCP wraps cluster 1's master: MCL books get path-split across its slaves
      THOTH_ENGINE_URL: "http://c1master:8080"
      # the engine's JSON Schema, mounted read-only below (single-sourced from pricer/)
      THOTH_SCHEMA_PATH: "/app/schema/thoth.schema.json"
    ports:
      - "7778:3001"
    volumes:
      - ./pricer/schema:/app/schema:ro
    networks: [thoth]

networks:
  thoth:

volumes:
  redis-data:
  bff-data:
