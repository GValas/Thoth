# nginx: serve the Angular SPA and reverse-proxy /api to the BFF (same origin -> no
# CORS, and the httpOnly refresh cookie flows straight through).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security response headers (defence-in-depth for the SPA). `always` so they are emitted
    # on error responses too. CSP: default self-only, but the app pulls Google Fonts from
    # index.html (fonts.googleapis.com for the CSS, fonts.gstatic.com for the woff2 files) —
    # allow just those. style-src needs 'unsafe-inline' because Angular injects component
    # styles inline; script-src does NOT (the prod build emits external, hash-free bundles and
    # no eval), so we keep it 'self'-only to block injected inline/eval script. frame-ancestors
    # 'none' + X-Frame-Options DENY stop clickjacking; nosniff stops MIME sniffing.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # Live SSE streams (spots/fx AND the correlation matrix): disable proxy buffering so ticks
    # reach the browser immediately, and hold the connection open. This prefix covers BOTH
    # /api/spots/stream and /api/spots/correl/stream — the latter would otherwise fall through
    # to the generic /api/ block below (buffering on), freezing the live correlation. Matched
    # before /api/ because it is the longer prefix. The /latest snapshot GETs share it harmlessly.
    location /api/spots/ {
        proxy_pass http://bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API -> BFF. The BFF already mounts everything under /api, so pass the URI through
    # unchanged (no trailing slash on proxy_pass). 'bff' resolves on the compose network.
    location /api/ {
        proxy_pass http://bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # grid pricing can take a while; don't cut long /price-backed requests short
        proxy_read_timeout 300s;
    }

    # MCP -> mcp service. The engine-as-agent-tools server (Streamable HTTP) shares this
    # origin so it lives on the SAME public port as the dashboard: http://<host>/mcp is the
    # POST endpoint, /mcp/healthz its probe. Stateless HTTP, but a POST can stream an SSE
    # reply, so disable buffering and hold the connection open like the /api/spots/ streams.
    # 'mcp' resolves on the compose network. Exact-match the endpoint; rewrite the health path.
    # The Authorization header (the MCP_API_KEY bearer token) passes through untouched:
    # nginx forwards all request headers unless a proxy_set_header overrides them.
    location = /mcp {
        proxy_pass http://mcp:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
    location = /mcp/healthz {
        proxy_pass http://mcp:3001/healthz;
        proxy_set_header Host $host;
    }

    # SPA client-side routing: fall back to index.html for non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache the fingerprinted bundles
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
