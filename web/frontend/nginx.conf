# nginx: serve the Angular SPA and reverse-proxy /api to the BFF (same origin -> no
# CORS, and the httpOnly refresh cookie flows straight through).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Live SSE streams (spots/fx AND the correlation matrix): disable proxy buffering so ticks
    # reach the browser immediately, and hold the connection open. This prefix covers BOTH
    # /api/spots/stream and /api/spots/correl/stream — the latter would otherwise fall through
    # to the generic /api/ block below (buffering on), freezing the live correlation. Matched
    # before /api/ because it is the longer prefix. The /latest snapshot GETs share it harmlessly.
    location /api/spots/ {
        proxy_pass http://bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API -> BFF. The BFF already mounts everything under /api, so pass the URI through
    # unchanged (no trailing slash on proxy_pass). 'bff' resolves on the compose network.
    location /api/ {
        proxy_pass http://bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # grid pricing can take a while; don't cut long /price-backed requests short
        proxy_read_timeout 300s;
    }

    # SPA client-side routing: fall back to index.html for non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache the fingerprinted bundles
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
